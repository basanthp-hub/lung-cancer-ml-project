apiVersion: apps/v1
kind: Deployment
metadata:
  name: lung-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lung-app
  template:
    metadata:
      labels:
        app: lung-app
    spec:
      containers:
      - name: lung-app
        image: lung-app
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: lung-service
spec:
  type: NodePort
  selector:
    app: lung-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007